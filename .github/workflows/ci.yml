name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only torch for CI (no GPU needed for unit tests)
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=term-missing

  privacy-guard:
    name: Privacy Guardrail Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for face detection imports
        run: |
          # Fail if any code imports face recognition libraries
          if grep -r "face_recognition\|deepface\|dlib\|cv2.CascadeClassifier.*face\|mediapipe.*face" src/; then
            echo "ERROR: Face detection library detected in src/. CleanBot must not detect human faces."
            exit 1
          fi
          echo "Privacy check passed: no face detection libraries found."
